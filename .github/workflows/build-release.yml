name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to create (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  # ── Windows .exe ─────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build Windows executable
        run: >
          pyinstaller
          --onefile
          --windowed
          --name BluecherryPy
          --collect-all PyQt6
          --hidden-import bluecherrypy
          main.py

      - uses: actions/upload-artifact@v4
        with:
          name: BluecherryPy-windows
          path: dist/BluecherryPy.exe

  # ── Linux binary ─────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system libraries
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libglib2.0-0 libegl1 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 libdbus-1-3

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build Linux binary
        run: >
          pyinstaller
          --onefile
          --name BluecherryPy
          --collect-all PyQt6
          --hidden-import bluecherrypy
          main.py

      - uses: actions/upload-artifact@v4
        with:
          name: BluecherryPy-linux
          path: dist/BluecherryPy

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare files
        run: |
          chmod +x artifacts/BluecherryPy-linux/BluecherryPy
          mv artifacts/BluecherryPy-linux/BluecherryPy \
             artifacts/BluecherryPy-linux/BluecherryPy-linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          name: BluecherryPy ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          body: |
            ## BluecherryPy Client — Bluecherry DVR Desktop Client

            ### Download
            | Platform | File | Instructions |
            |----------|------|--------------|
            | **Windows 10/11** | `BluecherryPy.exe` | Double-click to run. No Python needed. |
            | **Linux** (Ubuntu/Debian) | `BluecherryPy-linux` | `chmod +x BluecherryPy-linux && ./BluecherryPy-linux` |

            > **Windows Defender warning**: The app is safe but unsigned. Click **More info → Run anyway** if prompted.

            ### Features
            - Live MJPEG camera view with zoom & pan
            - Recordings browser with thumbnail previews
            - Playback and download of recordings
            - Multi-camera support, PTZ controls, dark UI

            ### Or install from source
            ```bash
            git clone https://github.com/jlrosssc/BlueCherryPy-Client.git
            cd BlueCherryPy-Client
            bash install_macos.sh    # macOS
            bash install_linux.sh    # Linux
            install_windows.bat      # Windows
            ```
          files: |
            artifacts/BluecherryPy-windows/BluecherryPy.exe
            artifacts/BluecherryPy-linux/BluecherryPy-linux
